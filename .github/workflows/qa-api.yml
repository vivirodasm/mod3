name: QA API Gate (Sesión 5)

# Suite api-lab (S4) en cada push/PR que toque APIs o este workflow.
# Réplica local en Docker: proyecto-integrador/ci-lab/README.md
# Patrones 2026: least privilege, concurrency, caché de uv.

on:
  push:
    paths:
      - "proyecto-integrador/api-lab/**"
      - "proyecto-integrador/ci-lab/**"
      - ".github/workflows/qa-api.yml"
  pull_request:
    paths:
      - "proyecto-integrador/api-lab/**"
      - "proyecto-integrador/ci-lab/**"
      - ".github/workflows/qa-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests (pytest + httpx)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyecto-integrador/api-lab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest -v

      - name: Run smoke only (filtro rápido en PR)
        run: uv run pytest -v -k smoke
